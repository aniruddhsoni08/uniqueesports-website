<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWNER PORTAL | Unique Esports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --sidebar: #0a0a0a;
            --card: #111111;
            --border: #222222;
            --accent: #ffffff;
            --text-dim: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* Login Screen */
        #login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 2px; }

        /* Dashboard Layout */
        #dashboard { display: none; min-height: 100vh; }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar h2 { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; margin-bottom: 50px; padding: 0 10px; }

        .nav-item {
            padding: 15px 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: #fff; }

        .main-content { margin-left: 260px; padding: 60px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        .header h1 { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 30px; }
        .stat-card span { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 2rem; font-weight: 700; margin-top: 10px; }

        /* Tables & Forms */
        .content-card { background: var(--card); border: 1px solid var(--border); padding: 40px; margin-bottom: 30px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border); }
        td { padding: 20px 15px; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; }

        .badge { padding: 4px 10px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border-radius: 2px; }
        .badge-upcoming { background: #222; color: #fff; }
        .badge-ongoing { background: #fff; color: #000; }
        .badge-completed { border: 1px solid #333; color: #666; }

        /* Inputs */
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--text-dim); }
        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; color: #fff; font-family: 'Inter'; }
        input:focus { border-color: #555; }

        .btn { padding: 12px 24px; font-family: 'Syncopate'; font-size: 0.7rem; border: none; cursor: pointer; transition: 0.3s; }
        .btn-white { background: #fff; color: #000; }
        .btn-white:hover { background: #ccc; }
        .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn-outline:hover { background: #1a1a1a; }
        .btn-danger { background: #ff4444; color: #fff; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 50px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); padding: 50px; }

        #toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; background: #fff; color: #000; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; display: none; z-index: 2000; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-page">
        <div class="login-box">
            <h1>OWNER ACCESS</h1>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-white" style="width: 100%;">Authorize</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="sidebar">
            <h2>UNIQUE</h2>
            <div class="nav-item active" data-target="overview">Overview</div>
            <div class="nav-item" data-target="tournaments">Tournaments</div>
            <div class="nav-item" data-target="registrations">Registrations</div>
            <div style="margin-top: auto;">
                <div class="nav-item" id="logout-btn">Log Out</div>
            </div>
        </div>

        <div class="main-content">
            <!-- Overview -->
            <div id="overview" class="tab-content">
                <div class="header">
                    <h1>DASHBOARD</h1>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><span>Total Events</span><p id="stat-total">0</p></div>
                    <div class="stat-card"><span>Active</span><p id="stat-active" style="color: #fff;">0</p></div>
                    <div class="stat-card"><span>Upcoming</span><p id="stat-upcoming">0</p></div>
                    <div class="stat-card"><span>Finished</span><p id="stat-completed" style="color: #666;">0</p></div>
                </div>
                <div class="content-card">
                    <div class="section-header">
                        <h2>Quick Add</h2>
                    </div>
                    <form id="quick-add-form">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group"><label>Name</label><input type="text" id="q-name" required></div>
                            <div class="form-group"><label>Game</label><input type="text" id="q-game" required></div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group"><label>Start</label><input type="datetime-local" id="q-start" required></div>
                            <div class="form-group"><label>End</label><input type="datetime-local" id="q-end" required></div>
                        </div>
                        <button type="submit" class="btn btn-white">Create Tournament</button>
                    </form>
                </div>
            </div>

            <!-- Tournaments List -->
            <div id="tournaments" class="tab-content hidden">
                <div class="header">
                    <h1>TOURNAMENTS</h1>
                    <button class="btn btn-white" onclick="document.querySelector('.nav-item[data-target=\'overview\']').click()">+ New</button>
                </div>
                <div class="content-card">
                    <table>
                        <thead>
                            <tr>
                                <th>Tournament</th>
                                <th>Game</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tournaments-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Registrations -->
            <div id="registrations" class="tab-content hidden">
                <div class="header">
                    <h1>REGISTRATIONS</h1>
                    <button id="export-btn" class="btn btn-outline">Export to Excel</button>
                </div>
                <div class="content-card">
                    <div class="form-group" style="max-width: 300px;">
                        <label>Filter by Event</label>
                        <select id="reg-filter-select">
                            <option value="">All Events</option>
                        </select>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Team/Player</th>
                                <th>Email</th>
                                <th>Count</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="registrations-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-family: 'Syncopate'; margin-bottom: 30px;">EDIT EVENT</h2>
            <form id="edit-form">
                <input type="hidden" id="e-id">
                <div class="form-group"><label>Name</label><input type="text" id="e-name" required></div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group"><label>Status</label>
                        <select id="e-status">
                            <option value="upcoming">Upcoming</option>
                            <option value="ongoing">Ongoing</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Prize Pool</label><input type="text" id="e-prize"></div>
                </div>
                <div class="form-group"><label>YouTube Link (Completed Stream)</label><input type="url" id="e-youtube"></div>
                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button type="submit" class="btn btn-white">Save Changes</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="button" id="delete-btn" class="btn btn-danger" style="margin-left: auto;">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const API_URL = '/api';

        // Helper to get session ID
        function getSessionId() {
            return localStorage.getItem('sessionId');
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            if (getSessionId()) showDashboard();

            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('logout-btn').addEventListener('click', logout);
            document.getElementById('quick-add-form').addEventListener('submit', createTournament);
            document.getElementById('edit-form').addEventListener('submit', updateTournament);
            document.getElementById('delete-btn').addEventListener('click', deleteTournament);
            document.getElementById('reg-filter-select').addEventListener('change', (e) => loadRegistrations(e.target.value));
            document.getElementById('export-btn').addEventListener('click', exportData);

            // Tab Switching
            document.querySelectorAll('.nav-item[data-target]').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const target = item.getAttribute('data-target');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    document.getElementById(target).classList.remove('hidden');
                    if (target === 'tournaments') loadTournaments();
                    if (target === 'registrations') {
                        loadTournaments(); // To populate filter
                        loadRegistrations();
                    }
                });
            });
        });

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch(`${API_URL}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('sessionId', data.sessionId);
                showDashboard();
            } else toast(data.error || 'Access Denied');
        }

        function showDashboard() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadStats();
        }

        function logout() {
            localStorage.removeItem('sessionId');
            location.reload();
        }

        async function loadStats() {
            const res = await fetch(`${API_URL}/tournaments`);
            const data = await res.json();
            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-upcoming').textContent = data.filter(t => t.status === 'upcoming').length;
            document.getElementById('stat-active').textContent = data.filter(t => t.status === 'ongoing').length;
            document.getElementById('stat-completed').textContent = data.filter(t => t.status === 'completed').length;
        }

        async function createTournament(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('q-name').value,
                game_type: document.getElementById('q-game').value,
                start_date: document.getElementById('q-start').value.replace('T', ' '),
                end_date: document.getElementById('q-end').value.replace('T', ' '),
                status: 'upcoming'
            };
            const sid = getSessionId();
            const res = await fetch(`${API_URL}/admin/tournaments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-session-id': sid },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                toast('Tournament Created');
                e.target.reset();
                loadStats();
            }
        }

        async function loadTournaments() {
            const res = await fetch(`${API_URL}/tournaments`);
            const data = await res.json();

            // Populate table
            const tbody = document.getElementById('tournaments-tbody');
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td><b>${t.name}</b></td>
                    <td>${t.game_type}</td>
                    <td><span class="badge badge-${t.status}">${t.status}</span></td>
                    <td><button class="btn btn-outline" onclick="openEdit(${t.id})">Edit</button></td>
                </tr>
            `).join('');

            // Populate filter select
            const select = document.getElementById('reg-filter-select');
            const currentVal = select.value;
            select.innerHTML = '<option value="">All Events</option>' + data.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            if (currentVal) select.value = currentVal;
        }

        async function openEdit(id) {
            const res = await fetch(`${API_URL}/tournaments/${id}`);
            const t = await res.json();
            document.getElementById('e-id').value = t.id;
            document.getElementById('e-name').value = t.name;
            document.getElementById('e-status').value = t.status;
            document.getElementById('e-prize').value = t.prize_pool || '';
            document.getElementById('e-youtube').value = t.youtube_link || '';
            document.getElementById('edit-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function updateTournament(e) {
            e.preventDefault();
            const id = document.getElementById('e-id').value;
            const payload = {
                name: document.getElementById('e-name').value,
                status: document.getElementById('e-status').value,
                prize_pool: document.getElementById('e-prize').value,
                youtube_link: document.getElementById('e-youtube').value
            };
            const sid = getSessionId();
            const res = await fetch(`${API_URL}/admin/tournaments/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'x-session-id': sid },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                toast('Updated Successfully');
                closeModal();
                loadTournaments();
                loadStats();
            }
        }

        async function deleteTournament() {
            if (!confirm('Permanently delete this tournament?')) return;
            const id = document.getElementById('e-id').value;
            const sid = getSessionId();
            const res = await fetch(`${API_URL}/admin/tournaments/${id}`, {
                method: 'DELETE',
                headers: { 'x-session-id': sid }
            });
            if (res.ok) {
                toast('Tournament Deleted');
                closeModal();
                loadTournaments();
                loadStats();
            }
        }

        async function loadRegistrations(tournamentId = '') {
            let url = `${API_URL}/admin/registrations/0`; // Use 0 to fetch all? No, the server.js requires tournament_id
            // Let's modify server.js or just fetch for current selection if select is changed.
            // Since current server.js needs tournament_id, if none is selected, maybe we show nothing or fix the API.
            // For now, I'll only load if tournamentId is present or handle empty.

            if (!tournamentId) {
                document.getElementById('registrations-tbody').innerHTML = '<tr><td colspan="4" style="text-align:center">Select an event to view registrations</td></tr>';
                return;
            }

            const sid = getSessionId();
            const res = await fetch(`${API_URL}/admin/registrations/${tournamentId}`, {
                headers: { 'x-session-id': sid }
            });

            if (res.status === 401) return toast('Session expired. Please log in again.');

            const data = await res.json();
            const tbody = document.getElementById('registrations-tbody');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.team_name}</td>
                    <td>${r.email}</td>
                    <td>${r.players_count}</td>
                    <td>${new Date(r.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" style="text-align:center">No registrations yet</td></tr>';
        }

        async function exportData() {
            const tid = document.getElementById('reg-filter-select').value;
            if (!tid) return toast('Select an event first');

            const sid = getSessionId();
            const res = await fetch(`${API_URL}/admin/export`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-session-id': sid },
                body: JSON.stringify({ tournament_id: tid })
            });

            if (res.status === 401) return toast('Unauthorized: Please log out and back in.');

            const data = await res.json();
            if (data.success) {
                window.location.href = `${API_URL}/admin/download/${data.fileName}?x-session-id=${sid}`;
            } else toast(data.error || 'Export Failed');
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
