<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIQUE ESPORTS | The Future of Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --primary: #ffffff;
            --accent: #ff003c; /* A slight touch of gaming red for depth, or keep pure B&W? Let's stick to B&W but use light/shadow for 3D */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            background-attachment: fixed;
            background-image:
                radial-gradient(circle at 20% 30%, #111 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #111 0%, transparent 40%);
        }

        /* Background 3D Elements - Optimized */
        .floating-element {
            position: fixed;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.03);
            z-index: -1;
            pointer-events: none;
            will-change: transform;
            animation: float 25s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Nav Header - 3D Floating */
        header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 1100px;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 15px 30px;
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-decoration: none;
            color: #fff;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
        }

        nav a:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        /* Hero Section with Perspective */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .hero-content {
            text-align: center;
            transform-style: preserve-3d;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            line-height: 0.8;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(100px);
        }

        .hero p {
            font-size: 1rem;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            transform: translateZ(50px);
        }

        /* Buttons with 3D Depth */
        .btn {
            padding: 18px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            background: #fff;
            color: #000;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255,255,255,0.4);
        }

        /* Tournament Grid */
        .section { padding: 100px 0; }
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 5px;
        }

        .tournaments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        /* 3D Tilt Card */
        .tournament-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            transform-style: preserve-3d;
            transition: border 0.3s ease;
        }

        .tournament-card:hover {
            border-color: rgba(255,255,255,0.4);
        }

        .tournament-card .status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: #fff;
            background: #222;
            padding: 5px 15px;
            border-radius: 100px;
            width: fit-content;
            margin-bottom: 20px;
            transform: translateZ(20px);
        }

        .tournament-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
            transform: translateZ(40px);
        }

        .tournament-card .info {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transform: translateZ(30px);
        }

        .tournament-card .meta {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-bottom: 30px;
            transform: translateZ(25px);
        }

        .meta-item span { display: block; font-size: 0.6rem; text-transform: uppercase; color: #555; }
        .meta-item p { font-weight: 700; font-size: 0.8rem; color: #fff; }

        .btn-join {
            width: 100%;
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            box-shadow: none;
            transform: translateZ(50px);
        }

        .btn-join:hover {
            background: #fff;
            color: #000;
        }

        /* Modal - Glassmorphism */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            padding: 50px;
            position: relative;
            transform-style: preserve-3d;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #888;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: #111;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #fff;
            color: #000;
            padding: 20px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            border-radius: 10px;
            display: none;
            z-index: 3000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Scanline Effect - Optimized */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 999;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.2;
        }

        @media (max-width: 768px) {
            header { top: 10px; padding: 10px 20px; }
            nav ul { display: none; }
            .hero h1 { font-size: 4rem; }
            .container { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">UNIQUE</a>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#tournaments">Events</a></li>
                <li><a href="/admin">Portal</a></li>
            </ul>
        </nav>
        <a href="#tournaments" class="btn" style="padding: 10px 20px; font-size: 0.6rem; box-shadow: none;">Enter Arena</a>
    </header>

    <section class="hero" id="home">
        <div class="hero-content" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-perspective="1000">
            <p>Welcome to the Elite</p>
            <h1>UNLEASH<br>POWERR</h1>
            <a href="#tournaments" class="btn">Discover Events</a>
        </div>
    </section>

    <section class="section" id="tournaments">
        <div class="container">
            <h2 class="section-title">Active Battles</h2>
            <div class="tournaments-grid" id="tournaments-container">
                <!-- Loaded via JS -->
            </div>
        </div>
    </section>

    <!-- Registration Modal -->
    <div class="modal" id="reg-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 2px;">SECURE ENTRY</h2>
            <form id="registration-form">
                <input type="hidden" id="tournament-id">
                <div class="form-group">
                    <label>Player/Team Handle</label>
                    <input type="text" id="name" placeholder="IGN" required>
                </div>
                <div class="form-group">
                    <label>Comms Email</label>
                    <input type="email" id="email" placeholder="email@domain.com" required>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Squad Size</label>
                        <input type="number" id="players" min="1" max="10" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Discord Tag</label>
                        <input type="text" id="phone" placeholder="User#0000">
                    </div>
                </div>
                <button type="submit" class="btn btn-join" style="width: 100%; border: 1px solid #fff; margin-top: 10px;">Transmit Data</button>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <footer style="padding: 100px 0; text-align: center; border-top: 1px solid var(--border);">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 10px; color: #333; margin-bottom: 20px;">UNIQUE ESPORTS</h2>
        <p style="color: #444; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 4px;">&copy; 2025 All Rights Reserved. Engineered for Excellence.</p>
    </footer>

    <script>
        const API_URL = '/api';

        // Background Particles - Reduced for performance
        function createParticles() {
            for(let i=0; i<8; i++) {
                const el = document.createElement('div');
                el.className = 'floating-element';
                const size = Math.random() * 100 + 50;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.animationDelay = Math.random() * 20 + 's';
                document.body.appendChild(el);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTournaments();
            createParticles();
            document.getElementById('registration-form').addEventListener('submit', handleRegister);
        });

        async function loadTournaments() {
            try {
                const res = await fetch(`${API_URL}/tournaments`);
                const tournaments = await res.json();
                const container = document.getElementById('tournaments-container');
                container.innerHTML = tournaments.map(t => {
                    let btnHtml = '';
                    if (t.status === 'completed') {
                        btnHtml = t.youtube_link ? `<a href="${t.youtube_link}" target="_blank" class="btn btn-join">Watch VOD</a>` : `<span class="btn btn-join" style="opacity: 0.2; cursor: default;">Concluded</span>`;
                    } else {
                        btnHtml = `<button onclick="openModal('${t.id}', '${t.name}')" class="btn btn-join">Register Squad</button>`;
                    }

                    return `
                        <div class="tournament-card" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.1">
                            <div class="status">${t.status}</div>
                            <h3>${t.name}</h3>
                            <p class="info">${t.game_type}</p>
                            <div class="meta">
                                <div class="meta-item"><span>Prize Pool</span><p>${t.prize_pool || 'REDACTED'}</p></div>
                                <div class="meta-item"><span>Entry Fee</span><p>${t.entry_fee || 'FREE'}</p></div>
                            </div>
                            <div class="meta" style="margin-top: 0; padding-top: 10px; border-top: none;">
                                <div class="meta-item"><span>Deployment</span><p>${new Date(t.start_date).toLocaleDateString()}</p></div>
                            </div>
                            ${btnHtml}
                        </div>
                    `;
                }).join('');

                // Initialize Tilt on new elements
                VanillaTilt.init(document.querySelectorAll(".tournament-card"), {
                    max: 10,
                    speed: 400,
                    glare: true,
                    "max-glare": 0.1,
                });
            } catch (err) {
                console.error('Data Transmission Error');
            }
        }

        function openModal(id, name) {
            document.getElementById('tournament-id').value = id;
            document.getElementById('modal-title').textContent = 'DEPLOY: ' + name;
            document.getElementById('reg-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('reg-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'TRANSMITTING...';

            const data = {
                tournament_id: document.getElementById('tournament-id').value,
                team_name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                players_count: document.getElementById('players').value,
                additional_info: 'Discord Entry'
            };

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    toast('TRANSMISSION SUCCESSFUL');
                    closeModal();
                    e.target.reset();
                } else toast('ENCRYPTION ERROR');
            } catch (err) {
                toast('CONNECTION LOST');
            } finally {
                btn.textContent = 'TRANSMIT DATA';
            }
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('reg-modal')) closeModal();
        }
    </script>
</body>
</html>
